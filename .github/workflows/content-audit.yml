name: Content Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate content suggestions
        run: npm run content:audit

      - name: Ensure review labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "content-review", color: "2563eb", description: "Automated content coverage review" },
              { name: "needs-human-review", color: "f59e0b", description: "Must be reviewed before publishing" },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              }
            }

      - name: Open content suggestions pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: content/weekly-audit
          commit-message: "chore: update content suggestions"
          title: "Weekly KnowYourRights content suggestions"
          body: |
            Automated content audit generated a fresh `docs/content-suggestions.md` report.

            Please review all legal content suggestions manually before moving anything into live FAQs, topics, or explainers.
          labels: content-review, needs-human-review
          add-paths: |
            docs/content-suggestions.md
