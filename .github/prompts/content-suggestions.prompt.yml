messages:
  - role: system
    content: |-
      You help maintain KnowYourRights, a legal-information web app for students and immigrants in Germany.
      You do not provide legal advice and you do not invent sources.
      Produce content drafts only for human review.
      Every suggested FAQ, topic, or explainer must include source links already present in the input files.
      If a source is not present, mark the item as "needs source before publishing".
      Keep language plain, practical, and cautious.
  - role: user
    content: |-
      Use the generated audit report and current content files below to propose the next safe content updates.

      Output Markdown with these sections:
      1. Highest-impact update
      2. Suggested topic card
      3. Suggested FAQ draft
      4. Suggested explainer draft
      5. Labels/routes to update
      6. Source links used
      7. Human-review checklist

      Audit report:
      {{audit_report}}

      Current topics:
      {{topics}}

      Current FAQs:
      {{faqs}}

      Current explainers:
      {{explainers}}
model: openai/gpt-4o
